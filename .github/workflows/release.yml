name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish BuffBar
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained, single-file publish (same as make-installer.bat).
      - name: Publish
        run: >
          dotnet publish .\BuffBar\BuffBar.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -o .\publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Produces installer\Buffmybar-W26.exe (used by winget and in-app auto-update).
      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" .\Buffmybar-W26.iss'

      # Portable ZIP alternative.
      - name: Portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          Compress-Archive -Path .\publish\* -DestinationPath .\artifacts\BuffBar-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\installer\Buffmybar-W26.exe
            .\artifacts\BuffBar-win-x64.zip
