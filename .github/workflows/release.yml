name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish BuffBar
    runs-on: windows-latest

    # Signing runs only when the certificate secrets are configured; otherwise
    # every signing step is skipped and the release is produced unsigned.
    env:
      HAS_SIGNING: ${{ secrets.SIGNING_PFX_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained, single-file publish (same as make-installer.bat).
      - name: Publish
        run: >
          dotnet publish .\BuffBar\BuffBar.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -o .\publish

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx",
            [Convert]::FromBase64String("${{ secrets.SIGNING_PFX_BASE64 }}"))

      # Sign the app BEFORE packaging so the installer ships a signed BuffBar.exe.
      - name: Sign application
        if: env.HAS_SIGNING == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\cert.pfx" /p "${{ secrets.SIGNING_PFX_PASSWORD }}" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 .\publish\BuffBar.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Produces installer\Buffmybar-W26.exe (used by winget and in-app auto-update).
      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" .\Buffmybar-W26.iss'

      - name: Sign installer
        if: env.HAS_SIGNING == 'true'
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /f "$env:RUNNER_TEMP\cert.pfx" /p "${{ secrets.SIGNING_PFX_PASSWORD }}" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 .\installer\Buffmybar-W26.exe

      # Portable ZIP alternative (contains the signed BuffBar.exe when signing is on).
      - name: Portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          Compress-Archive -Path .\publish\* -DestinationPath .\artifacts\BuffBar-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\installer\Buffmybar-W26.exe
            .\artifacts\BuffBar-win-x64.zip
