name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour publier une release

jobs:
  build:
    runs-on: windows-latest   # WPF / net8.0-windows : runner Windows obligatoire
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BuffBar.sln

      - name: Build (Release)
        run: dotnet build BuffBar.sln -c Release --no-restore

      - name: Test
        # Ne casse pas le build si aucun projet de test n'est présent.
        run: dotnet test BuffBar.sln -c Release --no-build --verbosity normal
        continue-on-error: false

      - name: Publish EXE
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet publish BuffBar/BuffBar.csproj -c Release -r win-x64
          --self-contained false -o publish-out
          /p:PublishSingleFile=true

      - name: Zip artefact
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path publish-out/* -DestinationPath BuffMyBar-W26-${{ github.ref_name }}.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: BuffMyBar-W26-${{ github.ref_name }}.zip
          generate_release_notes: true
