name: Publish to winget

# Submits the release installer to microsoft/winget-pkgs automatically.
# Requires:
#   - the release to attach Buffmybar-W26.exe (see release.yml);
#   - a repo secret WINGET_TOKEN: a classic PAT (public_repo scope) of an
#     account that has forked microsoft/winget-pkgs.
# First-ever submission may need to be done manually (see installer/winget/README.md);
# afterwards this workflow keeps winget up to date on every release.

on:
  release:
    types: [released]

jobs:
  publish:
    name: Submit manifest
    runs-on: windows-latest
    steps:
      - name: Submit to winget-pkgs
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: IneedABUFF.BuffMyBar
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
